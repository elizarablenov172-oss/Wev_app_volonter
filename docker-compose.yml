services:
  web:
    build:
      context: .
    container_name: volonter_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://volonter:volonter@postgres:5432/volonter?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:-change-me}"
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "http://localhost:3000"
      UPLOAD_DIR: "public/uploads"
      SMTP_HOST: "mailhog"
      SMTP_PORT: "1025"
      SMTP_FROM: "Evraziya <noreply@evraziya.local>"
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/public/uploads

  postgres:
    image: postgres:16-alpine
    container_name: volonter_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: volonter
      POSTGRES_PASSWORD: volonter
      POSTGRES_DB: volonter
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volonter"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Локальный SMTP для e-mail-уведомлений (UI на http://localhost:8025)
  mailhog:
    image: mailhog/mailhog
    container_name: volonter_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  uploads:
